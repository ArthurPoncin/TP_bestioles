services:
  bestioles:
    image: postgres:15-alpine
    container_name: bestioles
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bestioles
    ports:
      - "5432:5432"
    volumes:
      - bestioles_data:/var/lib/postgresql
      - ./dump-bestioles-2025-12-10.sql:/docker-entrypoint-initdb.d/init.sql
volumes:
  bestioles_data:
